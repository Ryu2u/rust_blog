<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/vite.svg"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/qweather-icons@1.6.0/font/qweather-icons.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#000000"/>
    <title>hai_tao@blog:~$</title>
    <style>
        :root {
            --color-bg-default: #000000;
            --color-font-default: #e0e0e0;
            --color-primary: #10a37f;
        }

        #loading-div {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 99999;
            background: var(--color-bg-default);
            opacity: 1;
            transition: opacity 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Monaco, 'Courier New', 'Fira Code', monospace;
        }

        .loading-text {
            color: var(--color-font-default);
            font-size: 14px;
        }

        .loading-text::before {
            content: '>';
            color: var(--color-primary);
            margin-right: 8px;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--color-primary);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 4px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
    <script>
        const theme = localStorage.getItem('theme-key');
        if (!theme) {
            localStorage.setItem('theme-key', 'dark');
            document.documentElement.setAttribute('theme', 'dark');
        } else {
            document.documentElement.setAttribute('theme', theme);
        }
        window.onload = () => {
            let div = document.getElementById("loading-div");
            div.style.opacity = "0";
            setTimeout(() => {
                div.remove();
            }, 500);
        }
    </script>
</head>
<body>
<div id="loading-div">
    <div class="loading-text">init<span class="cursor"></span></div>
</div>
<div id="root"></div>
<script type="module" src="./src/main.tsx"></script>
</body>
</html>
